<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracking</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="container">

<!-- SIDEBAR -->
<aside class="sidebar">
    <h2>Budget<span>Tracking</span></h2>

    <button class="nav-btn active" data-target="dashboard">Dashboard</button>
    <button class="nav-btn" data-target="add-student">Add Transaction</button>
    <button class="nav-btn" data-target="update-student">Update Transaction</button>
    <button class="nav-btn" data-target="categories">Categories</button>
    <button class="nav-btn" data-target="view-students">Transaction History</button>
</aside>

<!-- MAIN -->
<main class="content">

<header>
    <h1 id="page-title">Dashboard</h1>
    <div>
        <span>Admin</span>
        <button id="themeToggle" class="theme-btn">🌙</button>
    </div>
</header>

<!-- DASHBOARD -->
<section id="dashboard" class="view active">

<div class="stats-grid">
    <div class="stat-card purple"><h3>Total</h3><p id="total-count">0</p></div>
    <div class="stat-card green"><h3>Income</h3><p id="total-income">0</p></div>
    <div class="stat-card red"><h3>Expense</h3><p id="total-expense">0</p></div>
    <div class="stat-card blue"><h3>Balance</h3><p id="balance">0</p></div>
</div>

<!-- LINE CHART -->
<div class="card chart-card small-chart">
    <h2>Daily Spending Trend</h2>
    <canvas id="dailyChart"></canvas>
</div>

<!-- PIE CHART -->
<div class="card chart-row">

    <!-- Income vs Expense -->
    <div class="chart-box">
        <h3>Income vs Expense</h3>
        <canvas id="pieChart"></canvas>
    </div>

    <!-- Category Chart -->
    <div class="chart-box">
        <h3>Category Distribution</h3>
        <canvas id="categoryChart"></canvas>
    </div>

</div>


</section>

<!-- ADD -->
<section id="add-student" class="view">
<div class="card">
<h2>Add Transaction</h2>

<form id="student-form">
<div class="form-grid">

<input type="text" id="s_no" readonly>
<input type="text" id="category" placeholder="Category">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">

<select id="type">
<option value="expense">Expense</option>
<option value="income">Income</option>
</select>

</div>
<button class="submit-btn">Save</button>
</form>

</div>
</section>

<!-- UPDATE -->
<section id="update-student" class="view">
<div class="card">

<h2>Update Transaction</h2>

<!-- FETCH -->
<div class="form-grid">
    <input type="text" id="fetchId" placeholder="Enter ID">
    <button type="button" onclick="fetchDataForUpdate()">Fetch</button>
</div>

<!-- UPDATE FORM -->
<form id="update-form">

    <input type="hidden" id="updateSno">

    <div class="form-grid">

        <input id="updateCategory" placeholder="Category">
        <input id="updateAmount" placeholder="Amount">

        <input type="date" id="updateDate">

        <select id="updateType">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
        </select>

    </div>

    <button class="submit-btn" type="submit">Update</button>

</form>

</div>
</section>

<!-- CATEGORY -->
<section id="categories" class="view">
<div class="card">
<table>
<thead><tr><th>No</th><th>Category</th><th>Total</th></tr></thead>
<tbody id="category-table-body"></tbody>
</table>
</div>
</section>

<!-- HISTORY -->
<section id="view-students" class="view">
<div class="card">
<table>
<thead>
<tr>
<th>ID</th><th>Category</th><th>Amount</th><th>Date</th><th>Type</th><th>Action</th>
</tr>
</thead>
<tbody id="student-table-body"></tbody>
</table>
</div>
</section>

</main>
</div>

<script src="script1.js"></script>
</body>
</html>
