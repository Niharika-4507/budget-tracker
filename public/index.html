<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracking</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <h2>Budget<span>Tracking</span></h2>
            </div>
            <nav>
                <button class="nav-btn active" data-target="dashboard">Dashboard</button>
                <button class="nav-btn" data-target="add-student">Add Transaction</button>
                <button class="nav-btn" data-target="update-student">Set Budget</button>
                <button class="nav-btn" data-target="categories">Categories</button>
                <button class="nav-btn" data-target="view-students">Transaction History</button>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="content">

            <header>
                <h1 id="page-title">Dashboard</h1>
                <div class="user-info">
                    <span>Admin</span>
                </div>
            </header>

            <!-- DASHBOARD -->
             <section id="dashboard" class="view active">

        <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Amount</h3>
            <p id="total-count">0</p>
        </div>
        </div>

    <!-- ✅ CHART ONLY HERE -->
    <div class="card" style="margin-top:20px;">
        <h2>Daily Spending Trend</h2>
        <canvas id="dailyChart"></canvas>
    </div>

</section>
            <!-- <section id="dashboard" class="view active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Amount</h3>
                        <p id="total-count">0</p>
                    </div>
                </div>
            </section>
            <div class="card" style="margin-top:20px;">
            <h2>Daily Spending Trend</h2>
             <canvas id="dailyChart"></canvas>
            </div> -->

            <!-- ADD TRANSACTION -->
            <section id="add-student" class="view">
                <div class="card">
                    <h2>Add Your Expenses</h2>
                    <form id="student-form">
                        <div class="form-grid">

                            <div class="form-group">
                                <label for="s_no">s_no</label>
                                <input type="text" id="s_no" required placeholder="1,2..">
                            </div>

                            <div class="form-group">
                                <label for="category">Category</label>
                                <input type="text" id="category" required placeholder="Rent,Food,Bills etc">
                            </div>

                            <div class="form-group">
                                <label for="amount">Amount</label>
                                <input type="text" id="amount" placeholder="1000.00">
                            </div>

                            <div class="form-group">
                                <label for="date">Date</label>
                                <input type="date" id="date" placeholder="10-mar-2020">
                            </div>

                        </div>
                        <button type="submit" class="submit-btn">Save Expense</button>
                    </form>
                </div>
            </section>

            <!-- UPDATE -->
            <section id="update-student" class="view">
                <div class="card">
                    <h2>Update Expense</h2>

                    <div class="search-bar">
                        <label>Enter s_no to Edit</label>
                        <div class="search-row">
                            <input type="text" id="searchReg" placeholder="e.g.1">
                            <button id="search-btn" class="submit-btn">Fetch</button>
                        </div>
                    </div>

                    <form id="update-form" style="display:none; margin-top:20px;">
                        <div class="form-grid">

                            <div class="form-group">
                                <label>s_no</label>
                                <input type="text" id="updateSno" readonly>
                            </div>

                            <div class="form-group">
                                <label>Category</label>
                                <input type="text" id="updateCategory">
                            </div>

                            <div class="form-group">
                                <label>Amount</label>
                                <input type="text" id="updateAmount">
                            </div>

                            <div class="form-group">
                                <label>Date</label>
                                <input type="text" id="updateDate">
                            </div>

                        </div>

                        <button type="submit" class="submit-btn">Update</button>
                    </form>
                </div>
            </section>

            <!-- CATEGORIES (TOTAL VIEW) -->
            <section id="categories" class="view">
                <div class="card table-card">
                    <div class="table-header">
                        <h2>Category Summary</h2>
                        
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>s_no</th>
                                    <th>Category</th>
                                    <th>Total Amount</th>
                                </tr>
                            </thead>
                            <tbody id="category-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- TRANSACTION HISTORY -->
            <section id="view-students" class="view">
                <div class="card table-card">
                    <div class="table-header">
                        <h2>Transaction History</h2>
                        
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>s_no</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Date</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="student-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="script1.js"></script>
</body>
</html>
